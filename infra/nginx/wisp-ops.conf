# wisp-ops-center — örnek nginx yapılandırması
#
# Üretimde TLS sertifikalarını certbot/letsencrypt ile sağlayın.
# Bu dosya bir başlangıç şablonudur; domain ve sertifika yolları
# kuruma göre güncellenmelidir.

upstream wisp_ops_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream wisp_ops_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name ops.example.com;

    # HTTP → HTTPS yönlendirme
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ops.example.com;

    # ssl_certificate /etc/letsencrypt/live/ops.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ops.example.com/privkey.pem;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'" always;

    # API
    location /api/ {
        proxy_pass http://wisp_ops_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # Sağlık ucu (auth gerekmez)
    location = /api/v1/health {
        proxy_pass http://wisp_ops_api;
        access_log off;
    }

    # Next.js statik build (üretimde `next start` arkasında)
    location / {
        proxy_pass http://wisp_ops_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Yükleme limiti (örnek: profil fotoğrafı vb. — ileri faz)
    client_max_body_size 8m;
}
